site_name: peektea
site_description: A minimal terminal file browser built with Bubble Tea
site_url: https://lovestaco.github.io/peektea/
repo_name: lovestaco/peektea
repo_url: https://github.com/lovestaco/peektea
edit_uri: edit/master/docs/

exclude_docs: |
  releases/_template.md

hooks:
  - scripts/rewrite_release_images.py

theme:
  name: material
  custom_dir: docs/overrides
  favicon: media/favicon.svg
  logo: media/icon-96x96.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation:
      - installation/index.md
      - Configuration: installation/configuration.md
      - Uninstall: installation/uninstall.md
  - Usage:
      - usage/index.md
      - Navigation & keys: usage/keys.md
      - Opening files: usage/opening-files.md
      - Filtering: usage/filtering.md
      - Hidden files: usage/hidden-files.md
      - Preview panel: usage/preview.md
      - Sorting: usage/sorting.md
  - WSL support: wsl.md
  - Development: development.md
  - Releases:
      - releases/v0.2.1.md
      - releases/v0.2.0.md
      - releases/v0.1.0.md

extra:
  generator: false
