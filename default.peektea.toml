# ~/.peektea.toml — peektea file opener config
#
# Key format: dots in the extension are replaced with underscores,
# wrapped with a leading _ and a trailing _config.
#
#   file.md        → _md_config
#   archive.tar.gz → _tar_gz_config
#   hello.xd.dd    → _xd_dd_config
#   directory      → _dir_config
#   no extension   → _default_config

# Programs in this list get the terminal handed to them (vim-style).
# Everything else launches in the background (GUI apps like nautilus, eog).
# vim/nvim/nano/emacs/micro/hx/helix are already included by default.
terminal_programs = ["vim", "nvim", "nano", "micro", "hx", "helix"]

# fallback for anything not listed below
_default_config = "vim"

# directories — opened with file manager
_dir_config = "nautilus"

# text / code
_txt_config  = "vim"
_md_config   = "vim"
_go_config   = "vim"
_py_config   = "vim"
_sh_config   = "vim"
_js_config   = "vim"
_ts_config   = "vim"
_json_config = "vim"
_yaml_config = "vim"
_yml_config  = "vim"
_toml_config = "vim"
_html_config = "vim"
_css_config  = "vim"
_rs_config   = "vim"
_c_config    = "vim"
_h_config    = "vim"
_cpp_config  = "vim"

# images
_png_config  = "feh"
_jpg_config  = "feh"
_jpeg_config = "feh"
_gif_config  = "feh"
_svg_config  = "feh"
_webp_config = "feh"
_bmp_config  = "feh"

# documents
_pdf_config = "evince"

# archives
_tar_gz_config  = "nautilus"
_tar_bz2_config = "nautilus"
_zip_config     = "nautilus"
_gz_config      = "nautilus"
_xz_config      = "nautilus"
